# Blueprint do Render — cria o Web Service automaticamente ao conectar o repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: climacontrol-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Origens permitidas: dashboard em produção (Firebase Hosting) + dev local.
      - key: CORS_ORIGIN
        value: "https://movimenteunifecaf.web.app,https://movimenteunifecaf.firebaseapp.com,http://localhost:5173"
      - key: FIREBASE_DATABASE_URL
        value: "https://movimenteunifecaf-default-rtdb.firebaseio.com"
      # SECRETO — preencher manualmente no painel do Render (JSON inteiro, 1 linha).
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
