; PlatformIO — ClimaControl ESP32
;
; Dois ambientes:
;   [env:esp32dev]  → build para hardware real (placa ESP32 DevKit).
;   [env:wokwi]     → build para o simulador Wokwi. Define WOKWI_SIMULATION
;                     para ativar credenciais Wokwi-GUEST em config.h e
;                     trocar DHT11 → DHT22 em sensors.cpp.
;
; Compilar:
;   pio run -e esp32dev          (hardware)
;   pio run -e wokwi             (simulador; depois clique Play no diagram.json)
;
; Upload pra placa física:
;   pio run -e esp32dev -t upload
;
; src_dir = .  faz o PlatformIO compilar os .ino/.cpp deste diretório
; sem precisar reorganizar a pasta — a Arduino IDE continua funcionando.

[platformio]
src_dir = .

[env]
platform     = espressif32
framework    = arduino
monitor_speed = 115200

; IR + DHT + WiFi/HTTPClient estoura facilmente a partição padrão de 1.2MB.
; huge_app dá 3MB pra aplicação (e remove OTA, que não usamos).
board_build.partitions = huge_app.csv

; LDF deep+ resolve includes condicionais aninhados da lib IR.
lib_ldf_mode = deep+

monitor_filters = esp32_exception_decoder

; HTTPClient e WiFi vêm no core ESP32 — a integração ThingSpeak não precisa
; de biblioteca externa.
lib_deps =
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
    crankyoldgit/IRremoteESP8266

[env:esp32dev]
board = esp32dev

[env:wokwi]
board = esp32dev
build_flags = -DWOKWI_SIMULATION
