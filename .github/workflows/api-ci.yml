name: API CI

# Roda a cada push/PR que toca a API. Bloqueia o merge se os testes ou o
# lint do contrato (Spectral) falharem.
on:
  push:
    branches: [main]
    paths: ["api/**", ".github/workflows/api-ci.yml"]
  pull_request:
    paths: ["api/**", ".github/workflows/api-ci.yml"]

jobs:
  test:
    name: Lint do contrato + testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint do contrato OpenAPI (Spectral)
        run: npm run lint:openapi

      - name: Testes (vitest)
        run: npm test
